# permissions for end users to edit clusterhealthchecks.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: clusterhealthcheck-editor-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: cluster-health-operator
    app.kubernetes.io/part-of: cluster-health-operator
    app.kubernetes.io/managed-by: kustomize
  name: clusterhealthcheck-editor-role
rules:
- apiGroups:
  - healthcheck.healthcheck.io
  resources:
  - clusterhealthchecks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - healthcheck.healthcheck.io
  resources:
  - clusterhealthchecks/status
  verbs:
  - get
