    url: https://github.com/ShubhamNegi06/cluster-health-operator
  - name: Quay.io
    url: https://quay.io/repository/shubh06/cluster-health-operator
  maintainers:
  - email: your@email.com
    name: Shubham Negi
  minKubeVersion: 1.25.0
  provider:
    name: Shubham Negi
