apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "healthcheck.io/v1alpha1",
          "kind": "ClusterHealthCheck",
          "metadata": {
            "name": "daily-health"
          },
          "spec": {
            "checks": {
              "apiServer": {
                "enabled": true,
                "errorRatePercent": 5,
                "latencyThresholdMs": 1000
              },
              "argocd": {
                "alertOn": [
                  "Degraded",
                  "Unknown"
                ],
                "checkApplications": true,
                "enabled": false,
                "namespace": "argocd"
              },
              "clusterOperators": {
                "enabled": true
              },
              "customProjects": {
                "enabled": true,
                "projects": [
                  {
                    "checkDaemonSets": true,
                    "checkDeployments": true,
                    "name": "kube-system-check",
                    "namespace": "kube-system"
                  }
                ]
              },
              "etcd": {
                "dbSizeLimitMB": 4000,
                "enabled": true,
                "leaderChangesLimit": 5
              },
              "infraPods": {
                "enabled": true,
                "namespaces": [
                  "kube-system",
                  "local-path-storage"
                ],
                "podSelectors": [
                  {
                    "labelSelector": "component=etcd",
                    "namespace": "kube-system"
                  }
                ]
              },
              "mcps": {
                "enabled": true
              },
              "nodes": {
                "checkDiskPressure": true,
                "checkMemoryPressure": true,
                "checkNotReady": true,
                "checkPIDPressure": true,
                "enabled": true
              }
            },
            "notifications": {
              "email": {
                "enabled": false,
                "from": "healthcheck@example.com",
                "onStatus": [
                  "Warning",
                  "Critical"
                ],
                "smtp": "smtp.example.com:587",
                "to": [
                  "shubham@example.com"
                ]
              }
            },
            "reporting": {
              "prometheusMetrics": true,
              "retentionDays": 30,
              "storeReports": true
            },
            "schedule": "0 7 * * *"
          }
        }
      ]
    capabilities: Basic Install
    createdAt: "2026-05-29T05:30:32Z"
    description: A unified cluster health check operator for OpenShift and Kubernetes
    operators.operatorframework.io/builder: operator-sdk-v1.34.1
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: cluster-health-operator.v0.1.1
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - kind: ClusterHealthCheck
      name: clusterhealthchecks.healthcheck.io
      version: v1alpha1
    - kind: ClusterHealthReport
      name: clusterhealthreports.healthcheck.io
      version: v1alpha1
  description: |
    cluster-health-operator provides scheduled health checks across all
    critical cluster domains including etcd, API server, nodes,
    ClusterOperators, MCPs, infra pods, and ArgoCD applications.
  displayName: Cluster Health Operator
  icon:
  - base64data: ""
    mediatype: image/png
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - healthcheck.io
          resources:
          - clusterhealthchecks
          - clusterhealthreports
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - healthcheck.io
          resources:
          - clusterhealthchecks/status
          - clusterhealthreports/status
          verbs:
          - get
          - update
          - patch
        - apiGroups:
          - healthcheck.io
          resources:
          - clusterhealthchecks/finalizers
          verbs:
          - update
        - apiGroups:
          - ""
          resources:
          - nodes
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - ""
          resources:
          - pods
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - ""
          resources:
          - namespaces
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - apps
          resources:
          - deployments
          - statefulsets
          - daemonsets
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - config.openshift.io
          resources:
          - clusteroperators
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - machineconfiguration.openshift.io
          resources:
          - machineconfigpools
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - argoproj.io
          resources:
          - applications
          - applicationsets
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - authentication.k8s.io
          resources:
          - tokenreviews
          verbs:
          - create
        - apiGroups:
          - authorization.k8s.io
          resources:
          - subjectaccessreviews
          verbs:
          - create
        serviceAccountName: cluster-health-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/component: manager
          app.kubernetes.io/created-by: cluster-health-operator
          app.kubernetes.io/instance: controller-manager
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: deployment
          app.kubernetes.io/part-of: cluster-health-operator
          control-plane: controller-manager
        name: cluster-health-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --secure-listen-address=0.0.0.0:8443
                - --upstream=http://127.0.0.1:8080/
                - --logtostderr=true
                - --v=0
                image: registry.k8s.io/kubebuilder/kube-rbac-proxy:v0.15.0
                name: kube-rbac-proxy
                ports:
                - containerPort: 8443
                  name: https
                  protocol: TCP
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 5m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              - args:
                - --health-probe-bind-address=:8081
                - --metrics-bind-address=127.0.0.1:8080
                - --leader-elect
                command:
                - /manager
                image: cluster-health-operator:v0.1.0
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              securityContext:
                runAsNonRoot: true
              serviceAccountName: cluster-health-operator-controller-manager
              terminationGracePeriodSeconds: 10
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: cluster-health-operator-controller-manager
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - health
  - monitoring
  - openshift
  - kubernetes
  links:
